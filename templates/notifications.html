{% extends "base.html" %}
{% block title %}Notifications - Student Database Management{% endblock %}
{% block content %}
  <div class="card">
    <div class="card-header-row">
      <h2>Active notifications</h2>
      <form method="post" action="{{ url_for('clear_notifications') }}">
        <button type="submit" class="btn btn-accent">Clear notifications</button>
      </form>
    </div>
    <ul class="notification-list">
      {% for note in notifications %}
        <li>{{ note }}</li>
      {% else %}
        <li class="empty">No active notifications.</li>
      {% endfor %}
    </ul>
  </div>
{% endblock %}
